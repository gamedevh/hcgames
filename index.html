<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HC Games</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #1e1e1e; color: #fff;
    }
    header {
      background: #111; padding: 15px;
      text-align: center; font-size: 28px;
      font-weight: bold; letter-spacing: 2px;
    }
    nav {
      background: #222; padding: 10px;
      display: flex; justify-content: center; gap: 20px;
    }
    nav a {
      color: #fff; text-decoration: none; font-size: 18px;
    }
    .search-bar {
      margin: 20px auto; text-align: center;
    }
    .search-bar input {
      width: 50%; padding: 10px; font-size: 16px;
      border-radius: 8px; border: none;
    }
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px; padding: 20px;
    }
    .game-card {
      background: #333; border-radius: 12px;
      overflow: hidden; text-align: center;
      cursor: pointer; transition: transform 0.2s;
    }
    .game-card:hover { transform: scale(1.05); }
    .game-card img { width: 100%; height: 140px; object-fit: cover; }
    .game-card h3 { margin: 10px 0; font-size: 16px; }
    iframe {
      width: 100%; height: 80vh; border: none;
    }
  </style>
</head>
<body>
  <header>HC Games</header>
  <nav>
    <a href="index.html">Home</a>
    <a href="games.html">All Games</a>
    <a href="categories.html">Categories</a>
    <a href="about.html">About</a>
  </nav>

  <!-- Search bar -->
  <div class="search-bar">
    <input type="text" id="search" placeholder="Search games...">
  </div>

  <!-- Game library grid -->
  <div class="games-grid" id="gamesGrid">
    <!-- Example game cards -->
    <div class="game-card" onclick="loadGame('snowrider.html')">
      <img src="snowrider.jpg" alt="Snow Rider 3D">
      <h3>Snow Rider 3D</h3>
    </div>
    <div class="game-card" onclick="loadGame('retro-bowl.html')">
      <img src="retrobowl.jpg" alt="Retro Bowl">
      <h3>Retro Bowl</h3>
    </div>
    <div class="game-card" onclick="loadGame('drift-hunters.html')">
      <img src="drifthunters.jpg" alt="Drift Hunters">
      <h3>Drift Hunters</h3>
    </div>
    <!-- Add 100+ games here following the same format -->
  </div>

  <script>
    // Simple search filter
    const searchInput = document.getElementById('search');
    const gamesGrid = document.getElementById('gamesGrid');
    searchInput.addEventListener('keyup', () => {
      let filter = searchInput.value.toLowerCase();
      let cards = gamesGrid.getElementsByClassName('game-card');
      for (let card of cards) {
        let title = card.getElementsByTagName('h3')[0].innerText.toLowerCase();
        card.style.display = title.includes(filter) ? '' : 'none';
      }
    });

    // Load game in a new page
    function loadGame(gamePage) {
      window.location.href = gamePage;
    }
  </script>
</body>
</html>
